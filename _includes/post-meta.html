<ul class=post-meta>
    {% if post %}
        {% assign item = post %}
    {% else %}
        {% assign item = page %}
    {% endif %}
    <li class=publish-time><i class="fa fa-calendar fa-lg"></i>{{ item.date | date: "%Y 年 %m 月 %-d 日" }}</li>
    {% for tag in item.tags %}
        <li>&middot;</li>
        <li><a href="/tags/#{{ tag }}-ref">#{{ tag }}</a></li>
    {% endfor %}
</ul>
