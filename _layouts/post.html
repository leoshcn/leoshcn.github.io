---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y年 %-m月 %-d日 %R" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <article class="post-content">
    {{ content }} <br/>
  </article>
  
 欢迎通过 <a href="mailto:i@lixyun.com">email</a> 或 <a href="{{ site.twitter_url }}"> twitter </a> 来发表对本文的评论
  

</div>
